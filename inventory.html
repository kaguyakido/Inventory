<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Inventory API Console</title>
</head>

<style>
    :root {
      --bg:        #0d1117;
      --card-bg:   #161b22;
      --surface:   #21262d;
      --text:      #c9d1d9;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --border:    #30363d;
      --green:     #3fb950;
      --green-bg:  #238636;
      --red:       #f85149;
      --amber:     #d29922;
      --purple:    #bc8cff;
      --radius:    6px;
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
 
    /* ── Header ── */
    header {
      padding: 0.75rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; }
    h1 span { color: var(--accent); font-weight: 400; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      box-shadow: 0 0 6px var(--green);
    }
    .status-text { font-size: 0.75rem; color: var(--muted); font-family: monospace; }
    header nav { margin-left: auto; display: flex; gap: 8px; }
    .filter-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); padding: 4px 12px; border-radius: var(--radius);
      cursor: pointer; font-size: 0.75rem; font-family: monospace;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.08); }
 
    /* ── Layout ── */
    main { flex: 1; padding: 1.5rem 2rem; max-width: 1000px; margin: 0 auto; width: 100%; }
 
    /* ── Form ── */
    .form-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .form-label {
      font-size: 0.7rem; color: var(--muted);
      font-family: monospace; margin-bottom: 8px; display: block;
    }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
    input[type="text"], input[type="number"], select {
      background: #010409; border: 1px solid var(--border);
      color: var(--text); padding: 6px 10px; border-radius: var(--radius);
      font-size: 0.8rem; font-family: monospace; outline: none;
    }
    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      border-color: var(--accent);
    }
    #input-nom  { flex: 2; min-width: 140px; }
    #input-prix, #input-stock, #input-extra { flex: 1; min-width: 80px; }
    #input-cat  { flex: 1; min-width: 120px; }
    #input-extra{width:70px}
    .extra-field { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 120px; }
    .extra-field label { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }
 
    .btn-post {
      background: var(--green-bg); border: 1px solid #238636;
      color: #fff; padding: 6px 14px; border-radius: var(--radius);
      cursor: pointer; font-size: 0.8rem; font-family: monospace;
      white-space: nowrap; transition: opacity 0.15s;
    }
    .btn-post:hover { opacity: 0.85; }
 
    /* ── Résumé ── */
    #resume-stats {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      font-size: 0.75rem; color: var(--muted); margin-bottom: 1.25rem;
      font-family: monospace;
    }
    #resume-stats strong { color: var(--text); }
 
    /* ── Grid ── */
    #inventory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }
 
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex; flex-direction: column; gap: 8px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #444c56; }
 
    .card-header { display: flex; align-items: center; justify-content: space-between; }
    .card-id { font-size: 0.7rem; color: var(--muted); font-family: monospace; }
 
    .badge {
      font-size: 0.65rem; padding: 2px 8px; border-radius: 99px;
      font-family: monospace; font-weight: 600;
    }
    .badge-vetement    { background: rgba(188,140,255,0.15); color: var(--purple); }
    .badge-electronique { background: rgba(88,166,255,0.12); color: var(--accent); }
 
    .card-nom  { font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .card-meta { display: flex; justify-content: space-between; font-size: 0.8rem; }
    .card-prix { color: var(--green); font-family: monospace; }
    .card-stock { color: var(--muted); font-family: monospace; }
 
    .card-extra {
      display: flex; gap: 12px; font-size: 0.75rem;
      color: var(--muted); font-family: monospace;
    }
    .card-extra strong { color: var(--text); }
 
    .btn-delete {
      margin-top: 4px; background: transparent;
      border: 1px solid var(--border); color: var(--red);
      padding: 4px 10px; border-radius: var(--radius);
      cursor: pointer; font-size: 0.7rem; font-family: monospace;
      transition: all 0.15s; align-self: flex-start;
    }
    .btn-delete:hover { background: rgba(248,81,73,0.1); border-color: var(--red); }
 
    /* ── Console ── */
    .console-card {
      background: #010409; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px;
    }
    .console-title {
      font-size: 0.7rem; color: var(--muted);
      font-family: monospace; margin-bottom: 8px;
    }
    #api-console {
      font-family: monospace; font-size: 0.75rem;
      max-height: 120px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 3px;
    }
    .log-ok    { color: var(--green); }
    .log-error { color: var(--red); }
 
    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 0.5rem 2rem;
      font-size: 0.75rem; color: var(--muted);
      font-family: monospace;
    }
</style>

<body>

    <header>
        <h1>Inventor<span>.api</span></h1>
        <div class="status-dot"></div>
        <span class="status-text">200 OK — system ready</span>
        <nav>
            <button type="button" class="filter-btn active" data-filter="all">GET /all</button>
            <button type="button" class="filter-btn" data-filter="vetement">GET /vetement</button>
            <button type="button" class="filter-btn" data-filter="electronique">GET /electronique</button>
        </nav>
    </header>

    <main>
        <div class="form-card">
        <span class="form-label">POST /items — ajouter un article</span>
        <div class="form-row">
            <input type="text"   id="input-nom"   placeholder="Nom du produit" />
            <input type="number" id="input-prix"  placeholder="Prix (€)" step="0.01" min="0" />
            <input type="number" id="input-stock" placeholder="Stock" min="0" />
            <select aria-label="Catégorie" id="input-cat">
                <option value="vetement">Vêtement</option>
                <option value="electronique">Électronique</option>
            </select>
            <div class="extra-field">
                <label id="extra-label">Taille (S/M/L)</label>
                <input type="text" id="input-extra" placeholder="M" />
            </div>
            <button type="button" class="btn-post" id="btn-add">POST /items</button>
        </div>
        </div>
    
        <div id="resume-stats"></div>
        <section id="inventory-grid"></section>
    
        <div class="console-card">
        <div class="console-title">// api console</div>
        <div id="api-console"></div>
        </div>
    </main>

    <footer>
       status: 200 OK &nbsp;|&nbsp; items: <span id="count">0</span>
    </footer>

    <script type="module" src="./dist/app.js"></script>
</body>
</html>
